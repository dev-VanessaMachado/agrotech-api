services:
  postgres-agrotech:
    image: postgres:16-alpine
    container_name: postgres-agrotech-db
    environment:
      POSTGRES_USER: agrotech_user
      POSTGRES_PASSWORD: agrotech_password
      POSTGRES_DB: agrotech_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_agrotech_data:/var/lib/postgresql/data

volumes:
  postgres_agrotech_data: